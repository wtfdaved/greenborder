<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenborder — Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #2e7d52;
      --green-light: #4caf7d;
      --green-pale: #e8f5ee;
      --text: #1a2e22;
      --muted: #6b8f76;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--green-pale);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 3rem;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      border: 3px solid var(--green);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 22px;
      height: 22px;
      fill: var(--green);
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--green);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1rem;
    }

    h1 span {
      color: var(--green);
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .notify-form {
      display: flex;
      gap: 0.5rem;
      max-width: 420px;
      margin: 0 auto 3rem;
    }

    .notify-form input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1.5px solid #c5ddd0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input:focus {
      border-color: var(--green);
    }

    .notify-form input::placeholder {
      color: #a0b8a8;
    }

    .notify-form button {
      padding: 0.75rem 1.25rem;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .notify-form button:hover {
      background: var(--green-light);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #c5ddd0;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>
      <span class="logo-text">greenborder</span>
    </div>

    <h1>Something <span>green</span><br>is on the way.</h1>
    <p class="subtitle">
      We're working on something great. Be the first to know<br>when we launch.
    </p>

    <form class="notify-form" onsubmit="handleSubmit(event)">
      <input type="email" id="email" placeholder="your@email.com" required />
      <button type="submit">Notify me</button>
    </form>

    <div class="divider">stay tuned</div>

    <p class="footer">&copy; 2026 Greenborder. All rights reserved.</p>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const input = e.target.querySelector('input');
      btn.textContent = "You're on the list!";
      btn.style.background = '#4caf7d';
      btn.disabled = true;
      input.disabled = true;
    }
  </script>
</body>
</html>
